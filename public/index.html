<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ChaTalk</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: #f2f2f7;
      color: #000;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 48px 36px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 2px 20px rgba(0,0,0,0.06);
    }
    .logo { font-size: 52px; margin-bottom: 12px; }
    h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 4px; color: #000; }
    .subtitle { color: #8e8e93; font-size: 15px; margin-bottom: 32px; }
    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: none;
      background: #f2f2f7;
      color: #000;
      font-size: 17px;
      margin-bottom: 16px;
      outline: none;
      caret-color: #007AFF;
    }
    input::placeholder { color: #c7c7cc; }
    button {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: #007AFF;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:active { opacity: 0.7; }
    .status { font-size: 13px; color: #ff3b30; margin-top: 12px; min-height: 20px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">💬</div>
    <h1>ChaTalk</h1>
    <p class="subtitle">채팅에 오신 걸 환영해요</p>
    <input type="text" id="nickname" placeholder="닉네임을 입력하세요" maxlength="12" autocomplete="off">
    <button onclick="enter()">입장하기</button>
    <p class="status" id="status"></p>
  </div>
  <script>
    function enter() {
      const nick = document.getElementById('nickname').value.trim();
      if (!nick) { document.getElementById('status').textContent = '닉네임을 입력해주세요'; return; }
      localStorage.setItem('chatalk-nick', nick);
      window.location.href = '/rooms.html';
    }
    document.getElementById('nickname').addEventListener('keydown', e => {
      if (e.key === 'Enter') enter();
    });
    if (localStorage.getItem('chatalk-nick')) {
      document.getElementById('nickname').value = localStorage.getItem('chatalk-nick');
    }
  </script>
</body>
</html>
