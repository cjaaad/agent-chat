<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Agent Chat</title>
  <style>
    :root {
      --bg: #FEE500;
      --card-bg: #FFFFFF;
      --text: #191919;
      --sub: #8B8B8B;
      --input-bg: #F6F6F6;
      --btn-bg: #191919;
      --btn-text: #FFFFFF;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1A1D21;
        --card-bg: #222529;
        --text: #E4E4E4;
        --sub: #8B949E;
        --input-bg: #2C2F33;
        --btn-bg: #FEE500;
        --btn-text: #191919;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      -webkit-tap-highlight-color: transparent;
    }
    .wrap {
      text-align: center;
      padding: 2rem;
      max-width: 360px;
      width: 100%;
    }
    .logo {
      font-size: 48px;
      margin-bottom: 8px;
    }
    .title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 14px;
      color: var(--sub);
      margin-bottom: 32px;
    }
    .card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .card label {
      font-size: 13px;
      font-weight: 600;
      color: var(--sub);
      text-align: left;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .card input {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 12px;
      background: var(--input-bg);
      color: var(--text);
      font-size: 16px;
      outline: none;
      text-align: center;
    }
    .card input::placeholder {
      color: var(--sub);
    }
    .card button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--btn-bg);
      color: var(--btn-text);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.15s;
    }
    .card button:active {
      transform: scale(0.97);
    }
    .card button:disabled {
      opacity: 0.4;
      cursor: default;
    }
    .emoji-row {
      font-size: 32px;
      margin-top: 24px;
      letter-spacing: 8px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">💬</div>
  <div class="title">Agent Chat</div>
  <div class="subtitle">대가리 & 미코 채팅 시스템</div>
  
  <div class="card">
    <label>닉네임</label>
    <input type="text" id="nickInput" placeholder="이름을 입력하세요" maxlength="12" autocomplete="off">
    <button id="startBtn" disabled>시작하기</button>
  </div>

  <div class="emoji-row">🐶 🐰</div>
</div>

<script>
  const STORAGE_KEY = 'agent_chat_userId';
  const nickInput = document.getElementById('nickInput');
  const startBtn = document.getElementById('startBtn');

  // 이미 닉네임 있으면 바로 rooms로
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    window.location.href = `/rooms?user=${encodeURIComponent(saved)}`;
  }

  function updateBtn() {
    startBtn.disabled = nickInput.value.trim() === '';
  }

  nickInput.addEventListener('input', updateBtn);
  nickInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && nickInput.value.trim()) {
      start();
    }
  });
  startBtn.addEventListener('click', start);

  function start() {
    const name = nickInput.value.trim();
    if (!name) return;
    localStorage.setItem(STORAGE_KEY, name);
    window.location.href = `/rooms?user=${encodeURIComponent(name)}`;
  }

  nickInput.focus();
  updateBtn();
</script>
</body>
</html>
