<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ChaTalk - 채팅방</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --bg: #1a1a2e;
      --bg2: #16213e;
      --card: #0f3460;
      --text: #e8e8e8;
      --sub: #a0a0b0;
      --accent: #FEE500;
      --danger: #ff4757;
      --green: #2ed573;
      --radius: 16px;
    }
    [data-theme="light"] {
      --bg: #f0f0f5;
      --bg2: #ffffff;
      --card: #ffffff;
      --text: #1a1a2e;
      --sub: #777;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 500px;
      margin: 0 auto;
    }
    .header {
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .header h2 {
      font-size: 18px;
    }
    .header-actions {
      display: flex;
      gap: 8px;
    }
    .header-actions button {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      font-size: 16px;
      cursor: pointer;
      background: var(--card);
      color: var(--text);
    }
    .tabs {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: var(--sub);
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .list-item {
      display: flex;
      align-items: center;
      padding: 12px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s;
      gap: 12px;
      position: relative;
    }
    .list-item:hover {
      background: rgba(255,255,255,0.04);
    }
    .list-item:active {
      background: rgba(255,255,255,0.08);
    }
    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .friend-avatar {
      background: linear-gradient(135deg, #667eea, #764ba2);
    }
    .item-info {
      flex: 1;
      min-width: 0;
    }
    .item-name {
      font-weight: 600;
      font-size: 15px;
    }
    .item-desc {
      font-size: 12px;
      color: var(--sub);
      margin-top: 2px;
    }
    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
      color: var(--sub);
    }
    .online-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }
    .offline-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
    }
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--sub);
    }
    .empty .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 340px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    }
    .modal h3 {
      font-size: 16px;
      margin-bottom: 12px;
    }
    .friend-select {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .friend-chip {
      padding: 8px 14px;
      border-radius: 20px;
      background: var(--bg);
      font-size: 13px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.15s;
      user-select: none;
    }
    .friend-chip.selected {
      border-color: var(--accent);
      background: rgba(254,229,0,0.1);
    }
    .modal input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
    }
    .modal-buttons {
      display: flex;
      gap: 8px;
    }
    .modal-buttons button {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary {
      background: var(--accent);
      color: #333;
    }
    .btn-cancel {
      background: rgba(255,255,255,0.1);
      color: var(--text);
    }
    .btn-danger {
      background: var(--danger);
      color: #fff;
    }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 10px 24px;
      border-radius: 24px;
      font-size: 13px;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
    }
    .room-menu-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--sub);
      cursor: pointer;
      font-size: 14px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .room-menu-btn:hover {
      background: rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>
  <div class="header">
    <h2 id="headerTitle">채팅방</h2>
    <div class="header-actions">
      <button onclick="toggleTheme()" id="themeBtn">🌙</button>
      <button onclick="showCreateMenu()">➕</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('rooms')">채팅방</div>
    <div class="tab" onclick="switchTab('friends')">친구</div>
  </div>
  <div class="list" id="list"></div>

  <!-- 방 생성/친구 선택 모달 -->
  <div class="modal-overlay" id="createModal">
    <div class="modal">
      <h3 id="modalTitle">새 채팅방</h3>
      <div id="modalContent"></div>
      <div class="modal-buttons">
        <button class="btn-cancel" onclick="closeModal()">취소</button>
        <button class="btn-primary" id="modalActionBtn">만들기</button>
      </div>
    </div>
  </div>

  <!-- 방 나가기 확인 모달 -->
  <div class="modal-overlay" id="leaveModal">
    <div class="modal">
      <h3>채팅방 나가기</h3>
      <p style="color:var(--sub);font-size:14px;margin-bottom:12px;" id="leaveMsg"></p>
      <div class="modal-buttons">
        <button class="btn-cancel" onclick="closeLeaveModal()">취소</button>
        <button class="btn-danger" id="leaveConfirmBtn">나가기</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const NICK = localStorage.getItem('chatalk-nick') || '손님';
    const SOCKET_URL = window.location.origin;

    const theme = localStorage.getItem('chatalk-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('themeBtn').textContent = theme === 'dark' ? '☀️' : '🌙';

    function toggleTheme() {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('chatalk-theme', next);
      document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
    }

    let currentTab = 'rooms';
    let rooms = [];
    let friends = [];
    let socket;

    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2000);
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      if (tab === 'rooms') document.querySelectorAll('.tab')[0].classList.add('active');
      else document.querySelectorAll('.tab')[1].classList.add('active');
      document.getElementById('headerTitle').textContent = tab === 'rooms' ? '채팅방' : '친구';
      renderList();
    }

    function renderList() {
      const list = document.getElementById('list');
      if (currentTab === 'rooms') {
        if (rooms.length === 0) {
          list.innerHTML = `<div class="empty"><div class="icon">💬</div><p>아직 채팅방이 없어요</p><p style="font-size:12px;margin-top:4px;">➕ 버튼을 눌러 시작하세요</p></div>`;
        } else {
          list.innerHTML = rooms.map(r => {
            const isDM = r.type === 'dm';
            const others = Array.isArray(r.participants) ? r.participants.filter(p => p !== NICK) : [];
            const displayName = r.name || (isDM ? others[0] || '?' : others.join(', '));
            const icon = isDM ? '👤' : '👥';
            const badge = isDM ? '' : `<span class="badge">${others.length + 1}명</span>`;
            const lastMsg = r.last_message ? r.last_message.substring(0, 25) + (r.last_message.length > 25 ? '...' : '') : '';
            return `
              <div class="list-item" onclick="enterRoom('${r.id}')">
                <div class="avatar" style="background:linear-gradient(135deg, #667eea, #764ba2)">${icon}</div>
                <div class="item-info">
                  <div class="item-name">${escapeHtml(displayName)} ${badge}</div>
                  <div class="item-desc">${escapeHtml(lastMsg)}</div>
                </div>
                <button class="room-menu-btn" onclick="event.stopPropagation(); showLeaveModal('${r.id}','${escapeHtml(displayName)}')">⋮</button>
              </div>`;
          }).join('');
        }
      } else {
        // 친구 탭
        if (friends.length === 0) {
          list.innerHTML = `<div class="empty"><div class="icon">👥</div><p>아직 친구가 없어요</p><p style="font-size:12px;margin-top:4px;">채팅방을 만들면 자동으로 친구가 돼요</p></div>`;
        } else {
          Promise.all(
            friends.map(f => fetch(SOCKET_URL + '/api/friends/' + encodeURIComponent(f)).then(r => r.json()).catch(() => ({})))
          ).then(friendDetails => {
            list.innerHTML = friends.map((f, i) => {
              const d = friendDetails[i];
              const emoji = (d && d.avatar) ? d.avatar : '😶';
              const displayName = (d && d.display_name) ? d.display_name : f;
              const status = (d && d.status === 'online') ? '<div class="online-dot"></div>' : '<div class="offline-dot"></div>';
              return `
                <div class="list-item" onclick="createOrOpenDM('${f}')">
                  <div class="avatar friend-avatar">${emoji}</div>
                  <div class="item-info">
                    <div class="item-name">${escapeHtml(displayName)}</div>
                    <div class="item-desc">${status} 클릭해서 1:1 채팅</div>
                  </div>
                </div>`;
            }).join('');
          }).catch(() => {
            list.innerHTML = friends.map(f => `
              <div class="list-item" onclick="createOrOpenDM('${f}')">
                <div class="avatar friend-avatar">😶</div>
                <div class="item-info">
                  <div class="item-name">${escapeHtml(f)}</div>
                  <div class="item-desc">클릭해서 1:1 채팅</div>
                </div>
              </div>`).join('');
          });
        }
      }
    }

    function escapeHtml(text) {
      if (!text) return '';
      return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function enterRoom(roomId) {
      window.location.href = '/chat.html?room=' + encodeURIComponent(roomId) + '&nick=' + encodeURIComponent(NICK);
    }

    // 방 생성 모달
    let modalMode = '';
    let selectedFriends = [];

    function showCreateMenu() {
      modalMode = 'menu';
      selectedFriends = [];
      document.getElementById('createModal').classList.add('show');
      document.getElementById('modalTitle').textContent = '새 채팅방';
      document.getElementById('modalContent').innerHTML = `
        <button class="btn-primary" style="width:100%;margin-bottom:8px;padding:12px;border:none;border-radius:10px;background:var(--accent);color:#333;font-weight:600;cursor:pointer;" onclick="showDMSelector()">1:1 채팅 (DM)</button>
        <button class="btn-cancel" style="width:100%;padding:12px;border:none;border-radius:10px;background:rgba(255,255,255,0.1);color:var(--text);cursor:pointer;" onclick="showGroupSelector()">단체 채팅 (그룹)</button>
      `;
      document.getElementById('modalActionBtn').style.display = 'none';
    }

    function showDMSelector() {
      modalMode = 'dm';
      selectedFriends = [];
      document.getElementById('modalTitle').textContent = '1:1 채팅';
      const others = friends.filter(f => f !== NICK);
      if (others.length === 0) {
        document.getElementById('modalContent').innerHTML = `<p style="color:var(--sub)">1:1 채팅할 친구가 없어요</p>`;
        document.getElementById('modalActionBtn').style.display = 'none';
        return;
      }
      document.getElementById('modalContent').innerHTML = `
        <div class="friend-select">${others.map(f => `<div class="friend-chip" onclick="selectFriend('${f}', this, true)">${escapeHtml(f)}</div>`).join('')}</div>
      `;
      document.getElementById('modalActionBtn').style.display = '';
      document.getElementById('modalActionBtn').textContent = '만들기';
      document.getElementById('modalActionBtn').onclick = createDM;
    }

    function showGroupSelector() {
      modalMode = 'group';
      selectedFriends = [];
      document.getElementById('modalTitle').textContent = '단체 채팅';
      const others = friends.filter(f => f !== NICK);
      if (others.length === 0) {
        document.getElementById('modalContent').innerHTML = `<p style="color:var(--sub)">초대할 친구가 없어요</p>`;
        document.getElementById('modalActionBtn').style.display = 'none';
        return;
      }
      document.getElementById('modalContent').innerHTML = `
        <p style="font-size:12px;color:var(--sub);margin-bottom:8px;">초대할 친구 선택 (여러 명 가능)</p>
        <div class="friend-select">${others.map(f => `<div class="friend-chip" onclick="selectFriend('${f}', this)">${escapeHtml(f)}</div>`).join('')}</div>
        <input type="text" id="groupNameInput" placeholder="그룹 이름 (선택사항)" maxlength="20">
      `;
      document.getElementById('modalActionBtn').style.display = '';
      document.getElementById('modalActionBtn').textContent = '만들기';
      document.getElementById('modalActionBtn').onclick = createGroup;
    }

    function selectFriend(name, el, exclusive) {
      if (exclusive) {
        // DM은 한 명만
        selectedFriends = [name];
        document.querySelectorAll('.friend-chip').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
      } else {
        const idx = selectedFriends.indexOf(name);
        if (idx >= 0) {
          selectedFriends.splice(idx, 1);
          el.classList.remove('selected');
        } else {
          selectedFriends.push(name);
          el.classList.add('selected');
        }
      }
    }

    async function createDM() {
      if (selectedFriends.length === 0) {
        toast('친구를 선택해주세요');
        return;
      }
      const target = selectedFriends[0];
      try {
        const res = await fetch(SOCKET_URL + '/api/rooms/dm', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user1: NICK, user2: target })
        });
        const data = await res.json();
        if (data.room_id || data.id) {
          closeModal();
          enterRoom(data.room_id || data.id);
        } else if (data.error) {
          toast(data.error);
        } else {
          toast('방 생성 실패');
        }
      } catch (e) {
        toast('서버 오류');
      }
    }

    async function createGroup() {
      if (selectedFriends.length === 0) {
        toast('친구를 1명 이상 선택해주세요');
        return;
      }
      const groupName = document.getElementById('groupNameInput')?.value?.trim() || '';
      try {
        const res = await fetch(SOCKET_URL + '/api/rooms/group', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ participants: [NICK, ...selectedFriends], name: groupName })
        });
        const data = await res.json();
        if (data.room_id || data.id) {
          closeModal();
          enterRoom(data.room_id || data.id);
        } else if (data.error) {
          toast(data.error);
        } else {
          toast('그룹 생성 실패');
        }
      } catch (e) {
        toast('서버 오류');
      }
    }

    function closeModal() {
      document.getElementById('createModal').classList.remove('show');
    }

    // 방 나가기 모달
    let leaveRoomId = '';

    function showLeaveModal(roomId, displayName) {
      leaveRoomId = roomId;
      document.getElementById('leaveMsg').textContent = `"${displayName}" 방을 나가시겠습니까?`;
      document.getElementById('leaveModal').classList.add('show');
      document.getElementById('leaveConfirmBtn').onclick = leaveRoom;
    }

    function closeLeaveModal() {
      document.getElementById('leaveModal').classList.remove('show');
      leaveRoomId = '';
    }

    async function leaveRoom() {
      if (!leaveRoomId) return;
      try {
        const res = await fetch(SOCKET_URL + '/api/rooms/' + encodeURIComponent(leaveRoomId) + '/leave', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nickname: NICK })
        });
        const data = await res.json();
        if (data.ok || data.success) {
          toast('채팅방을 나갔습니다');
          closeLeaveModal();
          loadRooms();
        } else {
          toast(data.error || '실패');
        }
      } catch (e) {
        toast('서버 오류');
      }
    }

    // 친구 클릭: DM 있으면 바로 입장, 없으면 새로 생성
    async function createOrOpenDM(friend) {
      try {
        const join = fetch(SOCKET_URL + '/api/rooms/dm/join', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user1: NICK, user2: friend })
        });
        const res = await join;
        const data = await res.json();
        if (data.room_id || data.id) {
          enterRoom(data.room_id || data.id);
        } else if (data.error && data.error.includes('not found')) {
          // DM 없음 → 새로 만들기
          const createRes = await fetch(SOCKET_URL + '/api/rooms/dm', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user1: NICK, user2: friend })
          });
          const createData = await createRes.json();
          if (createData.room_id || createData.id) {
            enterRoom(createData.room_id || createData.id);
          } else {
            toast(createData.error || '생성 실패');
          }
        }
      } catch (e) {
        toast('서버 오류');
      }
    }

    async function loadRooms() {
      try {
        const res = await fetch(SOCKET_URL + '/api/rooms?nick=' + encodeURIComponent(NICK));
        const data = await res.json();
        rooms = data.rooms || data || [];
        renderList();
      } catch (e) {}
    }

    async function loadFriends() {
      try {
        const res = await fetch(SOCKET_URL + '/api/friends/all');
        const data = await res.json();
        friends = data.friends || data || [];
        renderList();
      } catch (e) {}
    }

    // Socket.IO 연결
    function connect() {
      socket = io(SOCKET_URL, {
        query: { nick: NICK, avatar: '😶' },
        transports: ['websocket', 'polling'],
        reconnection: true,
        reconnectionDelay: 1000,
        reconnectionAttempts: Infinity
      });

      socket.on('connect', () => {
        console.log('rooms: connected as', NICK);
      });

      socket.on('friend_update', function(data) {
        loadFriends();
      });

      socket.on('room_update', function(data) {
        loadRooms();
      });
    }

    loadRooms();
    loadFriends();
    connect();
  </script>
</body>
</html>
