<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Agent A - 대가리</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    :root {
      --bg: #B2C7D9;
      --header-bg: #A8C0D6;
      --my-bubble: #FEE500;
      --my-text: #191919;
      --other-bubble: #FFFFFF;
      --other-text: #191919;
      --input-bg: #FFFFFF;
      --input-text: #191919;
      --time-color: #8B8B8B;
      --shadow: 0 1px 2px rgba(0,0,0,0.10);
      --system-text: #6B7B8D;
      --btn-bg: #FEE500;
      --btn-text: #191919;
      --btn-disabled: #E0E0E0;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1A1D21;
        --header-bg: #222529;
        --my-bubble: #FEE500;
        --my-text: #191919;
        --other-bubble: #2C2F33;
        --other-text: #E4E4E4;
        --input-bg: #2C2F33;
        --input-text: #E4E4E4;
        --time-color: #8B8B8B;
        --shadow: 0 1px 2px rgba(0,0,0,0.30);
        --system-text: #8B949E;
        --btn-bg: #FEE500;
        --btn-text: #191919;
        --btn-disabled: #3A3D41;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    .chat-wrap {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg);
      position: relative;
    }

    /* ── Header ── */
    .chat-header {
      background: var(--header-bg);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }
    .chat-header .avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FEE500, #F5A623);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .chat-header .info { flex: 1; min-width: 0; }
    .chat-header .name {
      font-size: 16px; font-weight: 600;
      color: var(--other-text);
    }
    .chat-header .status {
      font-size: 12px; color: var(--system-text);
      display: flex; align-items: center; gap: 4px;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; display: inline-block;
    }
    .status-dot.online { background: #34C759; }
    .status-dot.offline { background: #FF3B30; }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 0; }

    .msg-row {
      display: flex;
      flex-direction: column;
      max-width: 75%;
      animation: msgIn 0.2s ease-out;
    }
    .msg-row.me { align-self: flex-end; align-items: flex-end; }
    .msg-row.other { align-self: flex-start; align-items: flex-start; }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bubble {
      padding: 9px 13px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.45;
      word-break: break-word;
      white-space: pre-wrap;
      box-shadow: var(--shadow);
      position: relative;
      max-width: 100%;
    }
    .me .bubble {
      background: var(--my-bubble);
      color: var(--my-text);
      border-top-right-radius: 4px;
    }
    .other .bubble {
      background: var(--other-bubble);
      color: var(--other-text);
      border-top-left-radius: 4px;
    }

    .time {
      font-size: 11px;
      color: var(--time-color);
      margin-top: 3px;
      padding: 0 4px;
    }
    .me .time { text-align: right; }
    .other .time { text-align: left; }

    .system-msg {
      align-self: center;
      font-size: 12px;
      color: var(--system-text);
      padding: 4px 12px;
      background: rgba(0,0,0,0.05);
      border-radius: 10px;
      margin: 4px 0;
    }
    @media (prefers-color-scheme: dark) {
      .system-msg { background: rgba(255,255,255,0.06); }
    }

    /* ── Input Area ── */
    .input-area {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      padding-bottom: calc(10px + var(--safe-bottom));
      background: var(--header-bg);
      border-top: 1px solid rgba(0,0,0,0.08);
      flex-shrink: 0;
      align-items: flex-end;
    }
    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: none;
      border-radius: 20px;
      font-size: 15px;
      background: var(--input-bg);
      color: var(--input-text);
      outline: none;
      min-width: 0;
      transition: background 0.15s;
    }
    .input-area input:disabled {
      opacity: 0.5;
    }
    .input-area input::placeholder {
      color: var(--time-color);
    }
    .send-btn {
      width: 42px; height: 42px;
      border: none;
      border-radius: 50%;
      background: var(--btn-bg);
      color: var(--btn-text);
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, opacity 0.15s;
    }
    .send-btn:active:not(:disabled) { transform: scale(0.93); }
    .send-btn:disabled {
      background: var(--btn-disabled);
      color: #999;
      cursor: default;
      opacity: 0.6;
    }
  </style>
</head>
<body>
<div class="chat-wrap">
  <!-- Header -->
  <div class="chat-header">
    <div class="avatar">🐶</div>
    <div class="info">
      <div class="name">대가리 (Agent A)</div>
      <div class="status">
        <span class="status-dot offline" id="statusDot"></span>
        <span id="statusText">연결 중...</span>
      </div>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Input -->
  <div class="input-area">
    <input type="text" id="msgInput" placeholder="메시지를 입력하세요..." disabled autocomplete="off">
    <button class="send-btn" id="sendBtn" disabled>↑</button>
  </div>
</div>

<script>
  (() => {
    const AGENT = 'A';
    const DISPLAY_NAME = '대가리';
    const EMIT_EVENT = 'message_from_a';
    const LISTEN_EVENT = 'message_to_a';

    const socket = io({ query: { agent: 'A' } });  // ✅ 자동 도메인 연결 + agent 식별

    const messagesEl = document.getElementById('messages');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');

    let connected = false;

    // ── Helpers ──
    function formatTime(iso) {
      const d = new Date(iso);
      const hh = String(d.getHours()).padStart(2, '0');
      const mm = String(d.getMinutes()).padStart(2, '0');
      return `${hh}:${mm}`;
    }

    function scrollBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addMessage(text, timestamp, isMe) {
      const row = document.createElement('div');
      row.className = `msg-row ${isMe ? 'me' : 'other'}`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      const time = document.createElement('div');
      time.className = 'time';
      time.textContent = formatTime(timestamp);

      row.appendChild(bubble);
      row.appendChild(time);
      messagesEl.appendChild(row);
      scrollBottom();
    }

    function addSystem(text) {
      const el = document.createElement('div');
      el.className = 'system-msg';
      el.textContent = text;
      messagesEl.appendChild(el);
      scrollBottom();
    }

    function setConnected(state) {
      connected = state;
      if (state) {
        statusDot.className = 'status-dot online';
        statusText.textContent = '연결됨';
        msgInput.disabled = false;
        msgInput.placeholder = '메시지를 입력하세요...';
        updateSendBtn();
      } else {
        statusDot.className = 'status-dot offline';
        statusText.textContent = '끊김';
        msgInput.disabled = true;
        sendBtn.disabled = true;
      }
    }

    function updateSendBtn() {
      sendBtn.disabled = !connected || msgInput.value.trim() === '';
    }

    function sendMessage() {
      const text = msgInput.value.trim();
      if (!text || !connected) return;

      const timestamp = new Date().toISOString();
      socket.emit(EMIT_EVENT, { text, timestamp });

      addMessage(text, timestamp, true);  // 내 메시지 표시
      msgInput.value = '';
      updateSendBtn();
      msgInput.focus();
    }

    // ── Events ──
    msgInput.addEventListener('input', updateSendBtn);
    msgInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    sendBtn.addEventListener('click', sendMessage);

    // ── Socket.IO ──
    socket.on('connect', () => {
      setConnected(true);
      addSystem(`${DISPLAY_NAME} 연결됨 ✨`);
    });

    socket.on('disconnect', () => {
      setConnected(false);
      addSystem(`연결 끊김. 재연결 시도 중...`);
    });

    socket.on(LISTEN_EVENT, (data) => {
      // data: { text, timestamp, sender }
      if (data.sender === AGENT) return;
      if (data.sender === 'system') {
        addSystem(data.text);
        return;
      }
      addMessage(data.text, data.timestamp, false);
    });

    // 서버가 message_to_a/message_to_b 로 상태 알림을 system sender로 보냄

    // ── Init ──
    updateSendBtn();
  })();
</script>
</body>
</html>
