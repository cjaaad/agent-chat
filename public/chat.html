<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ChaTalk</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --bg: #1a1a2e;
      --bg2: #16213e;
      --card: #0f3460;
      --text: #e8e8e8;
      --sub: #a0a0b0;
      --accent: #FEE500;
      --accent-text: #333;
      --bubble-mine: #0f3460;
      --bubble-other: #2a2a4a;
      --radius: 16px;
    }
    [data-theme="light"] {
      --bg: #a3c6e0;
      --bg2: #ffffff;
      --card: #ffffff;
      --text: #1a1a2e;
      --sub: #777;
      --bubble-mine: #FEE500;
      --accent-text: #333;
      --bubble-other: #ffffff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 500px;
      margin: 0 auto;
      overflow: hidden;
    }
    .header {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header .back-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--card);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .header .title-area {
      flex: 1;
      min-width: 0;
    }
    .header .title {
      font-size: 16px;
      font-weight: 700;
    }
    .header .subtitle {
      font-size: 12px;
      color: var(--sub);
    }
    .header .leave-btn {
      padding: 6px 12px;
      border-radius: 16px;
      border: 1px solid var(--danger);
      background: transparent;
      color: var(--danger);
      font-size: 12px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .msg-row {
      display: flex;
      gap: 8px;
      max-width: 85%;
      animation: fadeUp 0.2s ease;
    }
    .msg-row.mine {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .msg-row:not(.mine) {
      align-self: flex-start;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg-sender-avatar {
      width: 32px;
      height: 32px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      align-self: flex-end;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }
    .msg-bubble-wrapper {
      display: flex;
      flex-direction: column;
    }
    .msg-sender-name {
      font-size: 11px;
      color: var(--sub);
      margin-bottom: 2px;
      padding: 0 4px;
    }
    .msg-bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.4;
      word-break: break-word;
      position: relative;
    }
    .msg-row.mine .msg-bubble {
      background: var(--bubble-mine);
      color: var(--accent-text);
      border-bottom-right-radius: 4px;
    }
    .msg-row:not(.mine) .msg-bubble {
      background: var(--bubble-other);
      border-bottom-left-radius: 4px;
    }
    .msg-time {
      font-size: 10px;
      color: var(--sub);
      margin-top: 2px;
      padding: 0 4px;
    }
    .msg-row.mine .msg-time {
      text-align: right;
    }
    .system-msg {
      text-align: center;
      padding: 6px;
      font-size: 12px;
      color: var(--sub);
      opacity: 0.7;
    }
    .input-bar {
      display: flex;
      padding: 10px 16px;
      gap: 8px;
      background: var(--bg);
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .input-bar input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      background: var(--bg2);
      color: var(--text);
      font-size: 15px;
      outline: none;
    }
    .input-bar input:focus {
      border-color: var(--accent);
    }
    .input-bar button {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #333;
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.1s;
    }
    .input-bar button:active {
      transform: scale(0.9);
    }
    .date-divider {
      text-align: center;
      font-size: 11px;
      color: var(--sub);
      padding: 8px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="header">
    <button class="back-btn" onclick="history.back()">←</button>
    <div class="title-area">
      <div class="title" id="roomTitle">채팅방</div>
      <div class="subtitle" id="roomSub"></div>
    </div>
    <button class="leave-btn" onclick="leaveChat()">나가기</button>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-bar">
    <input type="text" id="msgInput" placeholder="메시지를 입력하세요" maxlength="500" autocomplete="off">
    <button onclick="sendMsg()">↑</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const ROOM_ID = params.get('room');
    const NICK = params.get('nick') || localStorage.getItem('chatalk-nick') || '손님';
    const SOCKET_URL = window.location.origin;

    if (!ROOM_ID) {
      window.location.href = '/rooms.html';
    }

    const messagesEl = document.getElementById('messages');
    const msgInput = document.getElementById('msgInput');
    let socket;
    let messageCount = 0;

    function scrollBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addSystemMsg(text) {
      const div = document.createElement('div');
      div.className = 'system-msg';
      div.textContent = text;
      messagesEl.appendChild(div);
      scrollBottom();
    }

    function addMsg(msg) {
      const isMine = msg.sender === NICK;
      const isSystem = msg.type === 'system' || msg.type === 'join' || msg.type === 'leave';
      if (isSystem) {
        addSystemMsg(msg.text || msg.message || '');
        return;
      }
      messageCount++;
      const div = document.createElement('div');
      div.className = 'msg-row' + (isMine ? ' mine' : '');
      const time = new Date(msg.time || Date.now());
      const timeStr = time.getHours().toString().padStart(2,'0') + ':' + time.getMinutes().toString().padStart(2,'0');

      div.innerHTML = `
        <div class="msg-sender-avatar">${(msg.avatar || '😶').substring(0,2)}</div>
        <div class="msg-bubble-wrapper">
          <div class="msg-sender-name">${escapeHtml(msg.sender)}</div>
          <div class="msg-bubble">${escapeHtml(msg.text || msg.message || '')}</div>
          <div class="msg-time">${timeStr}</div>
        </div>
      `;
      messagesEl.appendChild(div);
      scrollBottom();
    }

    function escapeHtml(text) {
      if (!text) return '';
      return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function sendMsg() {
      const text = msgInput.value.trim();
      if (!text || !socket || !socket.connected) return;
      socket.emit('send_message', {
        room_id: ROOM_ID,
        sender: NICK,
        text: text
      });
      msgInput.value = '';
    }

    function leaveChat() {
      if (!confirm('정말로 이 채팅방을 나가시겠습니까?')) return;
      if (socket && socket.connected) {
        socket.emit('leave_room', { room_id: ROOM_ID, nickname: NICK });
      }
      // 서버 API로도 나가기 요청
      fetch(SOCKET_URL + '/api/rooms/' + encodeURIComponent(ROOM_ID) + '/leave', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nickname: NICK })
      }).finally(() => {
        window.location.href = '/rooms.html';
      });
    }

    function connect() {
      socket = io(SOCKET_URL, {
        query: { nick: NICK, avatar: '😶' },
        transports: ['websocket', 'polling'],
        reconnection: true,
        reconnectionDelay: 1000,
        reconnectionAttempts: Infinity
      });

      socket.on('connect', () => {
        console.log('chat: connected as', NICK);
        socket.emit('join_room', {
          room_id: ROOM_ID,
          nickname: NICK,
          avatar: '😶'
        });
      });

      socket.on('message', function(msg) {
        addMsg(msg);
      });

      socket.on('room_deleted', function(data) {
        alert('이 채팅방이 삭제되었습니다.');
        window.location.href = '/rooms.html';
      });
    }

    // 방 정보 로드
    async function loadRoomInfo() {
      try {
        // /api/rooms/{room_id} 없으니 /api/rooms 에서 찾기
        const res = await fetch(SOCKET_URL + '/api/rooms?nick=' + encodeURIComponent(NICK));
        const rooms = await res.json();
        const roomList = rooms.rooms || rooms || [];
        const room = roomList.find(r => r.id === ROOM_ID);
        if (room) {
          const isDM = room.type === 'dm';
          const others = Array.isArray(room.participants) ? room.participants.filter(p => p !== NICK) : [];
          document.getElementById('roomTitle').textContent = room.name || (isDM ? (others[0] || '채팅') : others.join(', ') || '채팅방');
          document.getElementById('roomSub').textContent = (room.participants?.length || 0) + '명 참여중';
        }
      } catch (e) {}
    }

    loadRoomInfo();
    connect();

    msgInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMsg();
      }
    });
  </script>
</body>
</html>
