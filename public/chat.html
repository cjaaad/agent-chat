<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ChaTalk</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: #f2f2f7;
      color: #000;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 440px;
      margin: 0 auto;
      overflow: hidden;
    }

    /* Header */
    .header {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(242,242,247,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 0.5px solid rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .back-btn {
      width: 32px; height: 32px;
      border-radius: 16px;
      border: none;
      background: transparent;
      color: #007AFF;
      font-size: 20px;
      cursor: pointer;
    }
    .title-area { flex: 1; min-width: 0; text-align: center; }
    .title { font-size: 17px; font-weight: 600; color: #000; }
    .subtitle { font-size: 12px; color: #8e8e93; }
    .leave-btn {
      padding: 6px 14px;
      border-radius: 16px;
      border: none;
      background: transparent;
      color: #ff3b30;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }

    /* Messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* iMessage bubble rows */
    .msg-row {
      display: flex;
      gap: 6px;
      max-width: 80%;
      animation: fadeUp 0.2s ease;
    }
    .msg-row.mine { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row:not(.mine) { align-self: flex-start; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

    /* DM mode: hide avatars and names */
    .dm .msg-row .avatar,
    .dm .msg-row .sender-name,
    .dm .msg-row.mine .avatar,
    .dm .msg-row.mine .sender-name { display: none; }

    /* Group mode: show avatars and names for others */
    .group .msg-row:not(.mine) .avatar,
    .group .msg-row:not(.mine) .sender-name { display: flex; }
    .group .msg-row.mine .avatar,
    .group .msg-row.mine .sender-name { display: none; }

    .avatar {
      display: none;
      width: 30px; height: 30px;
      border-radius: 15px;
      align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      align-self: flex-end;
      background: #e5e5ea;
    }
    .sender-name {
      display: none;
      font-size: 11px;
      color: #8e8e93;
      margin-bottom: 2px;
      padding: 0 6px;
      font-weight: 500;
    }
    .msg-bubble-wrapper { display: flex; flex-direction: column; }

    /* iMessage bubbles */
    .msg-bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 16px;
      line-height: 1.35;
      word-break: break-word;
      position: relative;
    }
    /* Mine: iMessage blue */
    .msg-row.mine .msg-bubble {
      background: #007AFF;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    /* Other: iMessage gray */
    .msg-row:not(.mine) .msg-bubble {
      background: #e5e5ea;
      color: #000;
      border-bottom-left-radius: 4px;
    }

    /* DM-specific colors (override for cleaner look) */
    .dm .msg-row.mine .msg-bubble {
      background: #007AFF;
      color: #fff;
    }
    .dm .msg-row:not(.mine) .msg-bubble {
      background: #e5e5ea;
      color: #000;
    }

    .msg-time {
      font-size: 10px;
      color: #8e8e93;
      margin-top: 2px;
      padding: 0 6px;
    }
    .msg-row.mine .msg-time { text-align: right; }

    /* System messages */
    .system-msg {
      text-align: center;
      padding: 4px;
      font-size: 12px;
      color: #8e8e93;
    }

    /* Input bar */
    .input-bar {
      display: flex;
      padding: 8px 12px 12px;
      gap: 8px;
      background: rgba(242,242,247,0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 0.5px solid rgba(0,0,0,0.08);
    }
    .input-bar input {
      flex: 1;
      padding: 10px 16px;
      border-radius: 20px;
      border: 1px solid rgba(0,0,0,0.1);
      background: #fff;
      color: #000;
      font-size: 16px;
      outline: none;
      caret-color: #007AFF;
    }
    .input-bar input::placeholder { color: #c7c7cc; }
    .send-btn {
      width: 36px; height: 36px;
      border-radius: 18px;
      border: none;
      background: #007AFF;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .send-btn:active { opacity: 0.6; }
    .send-btn:disabled { opacity: 0.3; }
  </style>
</head>
<body>
  <div class="header">
    <button class="back-btn" onclick="history.back()">‹</button>
    <div class="title-area">
      <div class="title" id="roomTitle">채팅</div>
      <div class="subtitle" id="roomSub"></div>
    </div>
    <button class="leave-btn" onclick="leaveChat()">나가기</button>
  </div>
  <div class="messages group" id="messages"></div>
  <div class="input-bar">
    <input type="text" id="msgInput" placeholder="메시지" maxlength="500" autocomplete="off">
    <button class="send-btn" onclick="sendMsg()">↑</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const ROOM_ID = params.get('room');
    const NICK = params.get('nick') || localStorage.getItem('chatalk-nick') || '손님';
    const SOCKET_URL = window.location.origin;
    if (!ROOM_ID) window.location.href = '/rooms.html';

    const messagesEl = document.getElementById('messages');
    const msgInput = document.getElementById('msgInput');
    let socket, isDM = false;

    function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

    function addSystemMsg(text) {
      const div = document.createElement('div');
      div.className = 'system-msg';
      div.textContent = text;
      messagesEl.appendChild(div);
      scrollBottom();
    }

    function addMsg(msg) {
      const isMine = msg.sender === NICK;
      const isSystem = msg.type === 'system' || msg.type === 'join' || msg.type === 'leave';
      if (isSystem) { addSystemMsg(msg.text || msg.message || ''); return; }

      const div = document.createElement('div');
      div.className = 'msg-row' + (isMine ? ' mine' : '');
      const time = new Date(msg.time || Date.now());
      const timeStr = time.getHours().toString().padStart(2,'0') + ':' + time.getMinutes().toString().padStart(2,'0');

      div.innerHTML =
        '<div class="avatar">'+escapeHtml((msg.avatar||'😶').substring(0,2))+'</div>' +
        '<div class="msg-bubble-wrapper">' +
          '<div class="sender-name">'+escapeHtml(msg.sender)+'</div>' +
          '<div class="msg-bubble">'+escapeHtml(msg.text||msg.message||'')+'</div>' +
          '<div class="msg-time">'+timeStr+'</div>' +
        '</div>';

      messagesEl.appendChild(div);
      scrollBottom();
    }

    function escapeHtml(t) { return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function sendMsg() {
      const text = msgInput.value.trim();
      if (!text || !socket || !socket.connected) return;
      socket.emit('send_message', { room_id: ROOM_ID, sender: NICK, text });
      msgInput.value = '';
    }

    function leaveChat() {
      if (!confirm('이 채팅방을 나가시겠습니까?')) return;
      if (socket && socket.connected) socket.emit('leave_room', { room_id: ROOM_ID, nickname: NICK });
      fetch(SOCKET_URL + '/api/rooms/' + encodeURIComponent(ROOM_ID) + '/leave', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nickname: NICK })
      }).finally(() => { window.location.href = '/rooms.html'; });
    }

    function connect() {
      socket = io(SOCKET_URL, { transports: ['websocket', 'polling'], reconnection: true, reconnectionDelay: 1000, reconnectionAttempts: Infinity });
      socket.on('connect', () => { socket.emit('join_room', { room_id: ROOM_ID, nickname: NICK, avatar: '😶' }); });
      socket.on('message', msg => addMsg(msg));
      socket.on('room_deleted', () => { alert('채팅방이 삭제되었습니다.'); window.location.href = '/rooms.html'; });
    }

    async function loadRoomInfo() {
      try {
        const res = await fetch(SOCKET_URL + '/api/rooms?nick=' + encodeURIComponent(NICK));
        const data = await res.json();
        const roomList = data.rooms || data || [];
        const room = roomList.find(r => r.id === ROOM_ID);
        if (room) {
          isDM = room.type === 'dm' && room.participants && room.participants.length === 2;
          const others = (room.participants || []).filter(p => p !== NICK);
          document.getElementById('roomTitle').textContent = room.name || (isDM ? (others[0]||'') : others.join(', ') || '채팅방');
          document.getElementById('roomSub').textContent = isDM ? '' : (room.participants?.length || 0) + '명';
          if (isDM) { messagesEl.classList.remove('group'); messagesEl.classList.add('dm'); }
        }
      } catch(e) {}
    }

    msgInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
    });

    loadRoomInfo().then(connect);
  </script>
</body>
</html>
